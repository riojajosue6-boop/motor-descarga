<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador Pro - Calidad HD & MP3</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --success: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .ad-banner {
            width: 100%; max-width: 728px; height: 90px;
            background: #ddd; margin: 20px 0;
            display: flex; justify-content: center; align-items: center;
            color: #666; font-size: 12px; border: 1px dashed #999;
        }

        .main-card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 500px; text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 20px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        input[type="text"] {
            padding: 15px; border: 2px solid #eee; border-radius: 10px;
            font-size: 16px; outline: none;
        }

        .btn-action {
            padding: 15px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        .btn-analizar { background: var(--primary); color: white; }

        #preview-section {
            display: none; margin-top: 25px; padding-top: 20px;
            border-top: 1px solid #eee;
        }

        #video-thumb { width: 100%; border-radius: 12px; }

        /* ESTILO PARA LAS OPCIONES MP3/MP4 */
        .format-selector {
            display: flex; justify-content: center; gap: 20px;
            margin: 20px 0; padding: 10px;
            background: #f8f9fa; border-radius: 10px;
        }

        .format-selector label {
            font-weight: bold; color: #444; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        #status-msg { margin: 15px 0; font-weight: 600; color: #d35400; }

        .btn-descargar { background: var(--success); color: white; display: none; font-size: 18px; }

        footer { margin-top: auto; padding: 30px; text-align: center; font-size: 13px; color: #888; }
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; }

        #modal-legal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 85%; position: relative; }
    </style>
</head>
<body>

    <div class="ad-banner">ESPACIO PARA ANUNCIO (TOP)</div>

    <div class="main-card">
        <h1>Descargador Pro</h1>
        
        <div class="input-group">
            <input type="text" id="video-url" placeholder="Pega el link de YouTube aquí...">
            <button class="btn-action btn-analizar" onclick="analizarVideo()">Analizar Video</button>
        </div>

        <div id="preview-section">
            <img id="video-thumb" src="" alt="Miniatura">
            
            <div class="format-selector">
                <label>
                    <input type="radio" name="formato" value="mp4" checked> 🎬 MP4 (Video)
                </label>
                <label>
                    <input type="radio" name="formato" value="mp3"> 🎵 MP3 (Audio)
                </label>
            </div>

            <div id="status-msg"></div>
            <button id="btn-descarga-final" class="btn-action btn-descargar" onclick="iniciarProceso()">Descargar Ahora</button>
        </div>
    </div>

    <div class="ad-banner">ESPACIO PARA ANUNCIO (BOTTOM)</div>

    <footer>
        <p>&copy; 2026 Descargador Pro Bolivia</p>
        <a href="javascript:void(0)" onclick="abrirModal('privacidad')">Privacidad</a>
        <a href="javascript:void(0)" onclick="abrirModal('terminos')">Términos</a>
    </footer>

    <div id="modal-legal">
        <div class="modal-content">
            <span onclick="cerrarModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:24px;">&times;</span>
            <div id="legal-body"></div>
        </div>
    </div>

    <script>
        function analizarVideo() {
            const url = document.getElementById('video-url').value;
            const preview = document.getElementById('preview-section');
            const thumb = document.getElementById('video-thumb');
            const btn = document.getElementById('btn-descarga-final');
            const status = document.getElementById('status-msg');

            let videoId = "";
            if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0].substring(0, 11);
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0].substring(0, 11);

            if (videoId.length === 11) {
                thumb.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                preview.style.display = 'block';
                btn.style.display = 'block';
                status.innerText = "✅ Video detectado correctamente";
            } else {
                alert("Enlace no válido.");
            }
        }

        async function iniciarProceso() {
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('btn-descarga-final');
            const url = document.getElementById('video-url').value;
            const formato = document.querySelector('input[name="formato"]:checked').value;

            btn.disabled = true;
            let segundos = 5;

            const contador = setInterval(() => {
                status.innerText = `⏳ Procesando ${formato.toUpperCase()}... ${segundos}s`;
                if (segundos <= 0) {
                    clearInterval(contador);
                    status.innerText = "🚀 Obteniendo enlace...";
                    llamarAlMotor(url, formato);
                }
                segundos--;
            }, 1000);
        }

        async function llamarAlMotor(videoUrl, formatoSeleccionado) {
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('btn-descarga-final');

            try {
                // ANTES decía algo como: https://motor-descarga.onrender.com/descargar...
// AHORA debe decir simplemente:
                // Busca esta línea y déjala así:
                // Busca esta línea en tu index.html
                const urlServidor = "/descargar"; 
                const response = await fetch(`${urlServidor}?url=${encodeURIComponent(videoUrl)}&tipo=${formatoSeleccionado}`);
                const data = await response.json();

                if (data.download_url) {
                    status.innerText = "✅ ¡Listo!";
                    window.location.href = data.download_url;
                } else {
                    status.innerText = "❌ Error en el motor";
                }
            } catch (error) {
                status.innerText = "❌ Reintenta en 10 segundos.";
            } finally {
                btn.disabled = false;
            }
        }

        const textosLegales = {
            privacidad: "<h2>Privacidad</h2><p>No almacenamos tus datos personales.</p>",
            terminos: "<h2>Términos</h2><p>Uso personal y legal únicamente.</p>"
        };
        function abrirModal(tipo) { document.getElementById('legal-body').innerHTML = textosLegales[tipo]; document.getElementById('modal-legal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-legal').style.display = 'none'; }
    </script>
</body>
</html>
