<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descargador de Videos</title>
    <style>
        /* Tu diseño aquí (puedes pegar el CSS que ya tenías) */
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #ff0000; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Descarga tu video</h1>
    <input type="text" id="videoUrl" placeholder="Pega el link de YouTube aquí">
    <select id="formato">
        <option value="mp4">MP4 (Video)</option>
        <option value="mp3">MP3 (Audio)</option>
    </select>
    <button onclick="iniciarDescarga()">Descargar</button>
    <p id="mensaje"></p>

    <script>
        async function iniciarDescarga() {
            const url = document.getElementById('videoUrl').value;
            const tipo = document.getElementById('formato').value;
            const mensaje = document.getElementById('mensaje');

            if (!url) {
                alert("Por favor, pega una URL");
                return;
            }

            mensaje.innerText = "Procesando... espera 5 segundos";

            try {
                // AQUÍ ESTÁ EL CAMBIO CLAVE: Usamos la ruta relativa
                const response = await fetch(`/descargar?url=${encodeURIComponent(url)}&tipo=${tipo}`);
                const data = await response.json();

                if (data.download_url) {
                    mensaje.innerText = "¡Listo! La descarga comenzará.";
                    window.location.href = data.download_url;
                } else {
                    mensaje.innerText = "Error: " + (data.error || "No se pudo obtener el link");
                }
            } catch (error) {
                mensaje.innerText = "Error de conexión con el servidor.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
